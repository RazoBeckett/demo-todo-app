services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/todo-app}
      - PORT=${PORT:-3000}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pnpm db:push && pnpm start"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo-app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo-app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
